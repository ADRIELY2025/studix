{% extends "layouts/main.html" %}

{% block title %}Empresas{% endblock %}

{% block content %}
<div class="container">

    <!-- Título + botão -->
    <div class="row mb-3 align-items-center">
        <div class="col-md-6">
            <h4 class="fw-bold mb-0">Lista de Empresas</h4>
        </div>

        <div class="col-md-6 text-end">
            <button class="btn btn-success"
                onclick="api.window.openModal('pages/enterprise', { width: 900, height: 600, title: 'Cadastrar Empresa' })">
                <i class="fa-solid fa-plus me-1"></i>
                Nova Empresa
            </button>
        </div>
    </div>

    <!-- Tabela -->
    <div class="row">
        <div class="col-12">
            <div class="table-responsive">
                <table id="table-enterprises"
                    class="table table-striped table-hover table-bordered align-middle"
                    style="width: 100%;">

                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Razão Social</th>
                            <th>Nome Fantasia</th>
                            <th>CNPJ</th>
                            <th>Telefone</th>
                            <th>Email</th>
                            <th>Status</th>
                            <th style="width: 150px;">Ações</th>
                        </tr>
                    </thead>

                    <tbody></tbody>

                </table>
            </div>
        </div>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script defer type="module" src="file:///{{ assets }}/js/list-enterprise.js"></script>
{% endblock %}
