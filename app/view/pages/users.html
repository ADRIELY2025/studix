{% extends "layouts/main.html" %}

{% block title %}Novo Usuário{% endblock %}

{% block content %}
<div class="container">
    
    <div class="row mb-3">
        <div class="col-12">
            <h2>Cadastro de Usuário</h2>
        </div>
    </div>

    <form id="form">
        <input type="hidden" id="id" name="id">
        <input type="hidden" id="action" name="action">

        <div class="row">
            <!-- Nome -->
            <div class="col-md-6 mb-3">
                <label class="form-label">Nome</label>
                <input type="text" name="nome" class="form-control" placeholder="Digite o nome" required>
            </div>

            <!-- Email -->
            <div class="col-md-6 mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="Digite o email" required>
            </div>

            <!-- Senha -->
            <div class="col-md-6 mb-3">
                <label class="form-label">Senha</label>
                <input type="password" name="senha" class="form-control" placeholder="Digite a senha">
                
            </div>
        </div>

        <!-- Botão -->
        <div class="row mt-3">
            <div class="col-12">
                <button type="button" class="btn btn-success" id="insert">
                    <i class="fa-solid fa-floppy-disk"></i>
                    Salvar
                </button>
            </div>
        </div>
    </form>

</div>
{% endblock %}

{% block scripts %}
<script type="module" src="file:///{{ assets }}/js/users.js"></script>
{% endblock %}
