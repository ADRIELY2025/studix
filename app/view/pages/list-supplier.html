{% extends "layouts/main.html" %}

{% block title %}Fornecedores{% endblock %}

{% block content %}
<div class="container">

    <!-- Título + botão -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="fw-bold mb-0">Lista de Fornecedores</h4>

        <button class="btn btn-success"
            onclick="api.window.openModal('pages/supplier', { width: 900, height: 600, title: 'Cadastrar Fornecedor' })">
            <i class="fa-solid fa-plus me-1"></i>
            Novo Fornecedor
        </button>
    </div>

    <!-- Tabela -->
    <div class="card shadow-sm">
        <div class="card-body">
            <table id="table-suppliers" class="table table-striped table-hover table-bordered align-middle w-100">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Nome Fantasia</th>
                        <th>Razão Social</th>
                        <th>CPF / CNPJ</th>
                        <th>RG / IE</th>
                        <th class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script defer type="module" src="file:///{{ assets }}/js/list-supplier.js"></script>
{% endblock %}
